name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: macos-14
    defaults:
      run:
        working-directory: slipstream
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: slipstream/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run check:package-config
      - run: npm test
      - run: npm run lint
      - run: npm run build:renderer
      - run: xcrun swiftc -typecheck scripts/VisionOCR.swift
